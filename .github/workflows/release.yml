name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: bazel-contrib/setup-bazel@v0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Run tests
        run: bazel test --config=ci //...

      - name: Build all platforms
        run: bazel build --config=ci //cmd/devops-starter:release

      - name: Collect binaries and generate checksums
        run: |
          mkdir -p dist
          cp bazel-bin/cmd/devops-starter/devops-starter-* dist/
          cd dist
          sha256sum devops-starter-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/devops-starter-*
            dist/checksums.txt

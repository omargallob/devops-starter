name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GH_TOKEN: ${{ github.token }}
  

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/install.sh
          find dotfiles -name "*.sh" -exec shellcheck {} +

  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, test, bazel]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" -o devops-starter-${{ matrix.os }}-${{ matrix.arch }} ./cmd/devops-starter/

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: devops-starter-${{ matrix.os }}-${{ matrix.arch }}
          path: devops-starter-${{ matrix.os }}-${{ matrix.arch }}

  bazel:
    name: Bazel Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Mount bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: bazel-${{ runner.os }}-

      - name: Build with Bazel
        run: bazelisk build //...

      - name: Test with Bazel
        run: bazelisk test //...

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  golangci-lint:
    name: Linter - golangci-lint
    if: github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-golangci-lint
          repository-cache: true

      - name: Run golangci-lint
        run: bazel test --config=ci //:golangci_lint

  shellcheck:
    name: Linter - shellcheck
    if: github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-shellcheck
          repository-cache: true

      - name: Run shellcheck
        run: bazel test --config=ci //:shellcheck

  yamllint:
    name: Linter - yamllint
    if: github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-yamllint
          repository-cache: true

      - name: Run yamllint
        run: bazel test --config=ci //:yamllint

  actionlint:
    name: Linter - actionlint
    if: github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-actionlint
          repository-cache: true

      - name: Run actionlint
        run: bazel test --config=ci //:actionlint

  test:
    name: bazel test //...
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--')
    needs: [golangci-lint, shellcheck, yamllint, actionlint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD | grep -v '^\.github/' || true)
          if [[ -z "$CHANGED" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Only .github/ files changed — skipping tests"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-test
          repository-cache: true

      - name: Run tests
        if: steps.changes.outputs.skip != 'true'
        run: bazel test --config=ci //... -- -//:golangci_lint -//:shellcheck -//:yamllint -//:actionlint

  coverage:
    name: Coverage badge update
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [golangci-lint, shellcheck, yamllint, actionlint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-coverage
          repository-cache: true

      - name: Coverage
        run: bazel coverage --config=ci --combined_report=lcov //...

      - name: Update coverage badge
        run: |
          LCOV_FILE="$(bazel info output_path)/_coverage/_coverage_report.dat"
          if [[ ! -f "$LCOV_FILE" ]]; then
            echo "::warning::No combined coverage report found"
            exit 0
          fi
          HITS=$(awk -F: '/^DA:/ { split($2,a,","); total++; if(a[2]>0) hit++ } END { printf "%.1f", (hit/total)*100 }' "$LCOV_FILE")
          echo "Coverage: ${HITS}%"
          bazel run --config=ci //cmd/generate-coverage-badge -- "$HITS" "$PWD/badges/coverage.svg"

          # Encode new SVG for API upload
          NEW_CONTENT=$(base64 -w0 badges/coverage.svg)

          # Fetch current file SHA and content from the badges branch
          SHA=$(gh api "/repos/${{ github.repository }}/contents/badges/coverage.svg?ref=badges" \
            --jq '.sha' 2>/dev/null || echo "")
          OLD_CONTENT=$(gh api "/repos/${{ github.repository }}/contents/badges/coverage.svg?ref=badges" \
            --jq '.content' 2>/dev/null | tr -d '\n' || echo "")

          if [[ "$NEW_CONTENT" == "$OLD_CONTENT" ]]; then
            echo "Badge unchanged, skipping commit."
          else
            gh api --method PUT /repos/${{ github.repository }}/contents/badges/coverage.svg \
              --field message="ci: update coverage badge [skip ci]" \
              --field content="$NEW_CONTENT" \
              ${SHA:+--field sha="$SHA"} \
              --field branch="badges"
            echo "Badge updated via API on badges branch."
          fi

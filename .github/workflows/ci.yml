name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: bazel-contrib/setup-bazel@v0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-check
          repository-cache: true

      - name: Test and lint
        run: bazel test --config=ci //...

  build:
    name: Build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: bazel-contrib/setup-bazel@v0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-build
          repository-cache: true

      - name: Build release binaries
        run: bazel build --config=ci //cmd/devops-starter:release

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: devops-starter-binaries
          path: bazel-bin/cmd/devops-starter/devops-starter-*

      - name: Coverage
        run: bazel coverage --config=ci --combined_report=lcov //...

      - name: Update coverage badge
        run: |
          LCOV_FILE="$(bazel info output_path)/_coverage/_coverage_report.dat"
          if [[ ! -f "$LCOV_FILE" ]]; then
            echo "::warning::No combined coverage report found"
            exit 0
          fi
          HITS=$(awk -F: '/^DA:/ { split($2,a,","); total++; if(a[2]>0) hit++ } END { printf "%.1f", (hit/total)*100 }' "$LCOV_FILE")
          echo "Coverage: ${HITS}%"
          bazel run --config=ci //cmd/generate-coverage-badge -- "$HITS" "$PWD/badges/coverage.svg"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.svg
          if git diff --cached --quiet; then
            echo "Badge unchanged, skipping commit."
          else
            git commit -m "ci: update coverage badge [skip ci]"
            git push
          fi

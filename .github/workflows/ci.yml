name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  golangci-lint:
    name: Linter - golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-golangci-lint
          repository-cache: true

      - name: Run golangci-lint
        run: bazel test --config=ci //:golangci_lint

  shellcheck:
    name: Linter - shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-shellcheck
          repository-cache: true

      - name: Run shellcheck
        run: bazel test --config=ci //:shellcheck

  yamllint:
    name: Linter - yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-yamllint
          repository-cache: true

      - name: Run yamllint
        run: bazel test --config=ci //:yamllint

  actionlint:
    name: Linter - actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-actionlint
          repository-cache: true

      - name: Run actionlint
        run: bazel test --config=ci //:actionlint

  test:
    name: bazel test //...
    needs: [golangci-lint, shellcheck, yamllint, actionlint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-test
          repository-cache: true

      - name: Run tests
        run: bazel test --config=ci //... -- -//:golangci_lint -//:shellcheck -//:yamllint -//:actionlint

  coverage:
    name: Coverage badge update
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-coverage
          repository-cache: true

      - name: Coverage
        run: bazel coverage --config=ci --combined_report=lcov //...

      - name: Update coverage badge
        run: |
          LCOV_FILE="$(bazel info output_path)/_coverage/_coverage_report.dat"
          if [[ ! -f "$LCOV_FILE" ]]; then
            echo "::warning::No combined coverage report found"
            exit 0
          fi
          HITS=$(awk -F: '/^DA:/ { split($2,a,","); total++; if(a[2]>0) hit++ } END { printf "%.1f", (hit/total)*100 }' "$LCOV_FILE")
          echo "Coverage: ${HITS}%"
          bazel run --config=ci //cmd/generate-coverage-badge -- "$HITS" "$PWD/badges/coverage.svg"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.svg
          if git diff --cached --quiet; then
            echo "Badge unchanged, skipping commit."
          else
            git commit -m "ci: update coverage badge [skip ci]"
            git push
          fi

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  GH_TOKEN: ${{ github.token }}
  

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: shellcheck
        run: |
          sudo apt-get install -y shellcheck
           shellcheck scripts/install.sh
          find dotfiles -name "*.sh" -exec shellcheck {} +

  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, test, bazel]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" -o devops-starter-${{ matrix.os }}-${{ matrix.arch }} ./cmd/devops-starter/

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: devops-starter-${{ matrix.os }}-${{ matrix.arch }}
          path: devops-starter-${{ matrix.os }}-${{ matrix.arch }}

  bazel:
    name: Bazel Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Mount bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: bazel-${{ runner.os }}-

      - name: Build with Bazel
        run: bazelisk build //...

      - name: Test with Bazel
        if: github.event_name == 'pull_request'
        run: bazelisk test //...

      - name: Coverage with Bazel
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bazelisk coverage --combined_report=lcov //...

      - name: Update coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Extract coverage percentage from the combined lcov report.
          LCOV_FILE="$(bazelisk info output_path)/_coverage/_coverage_report.dat"
          if [[ ! -f "$LCOV_FILE" ]]; then
            echo "::warning::No combined coverage report found"
            exit 0
          fi
          # Sum lines hit / lines found across all records.
          HITS=$(awk -F: '/^DA:/ { split($2,a,","); total++; if(a[2]>0) hit++ } END { printf "%.1f", (hit/total)*100 }' "$LCOV_FILE")
          echo "Coverage: ${HITS}%"
          # Generate the badge SVG.
          go run ./cmd/generate-coverage-badge "$HITS" badges/coverage.svg
          # Commit and push if changed.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.svg
          if git diff --cached --quiet; then
            echo "Badge unchanged, skipping commit."
          else
            git commit -m "ci: update coverage badge [skip ci]"
            git push
          fi

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
  settings:
    errcheck:
      exclude-functions:
        - (*os.File).Close
        - (io.Closer).Close
        - (*compress/gzip.Reader).Close
        - (*archive/tar.Writer).Close
        - (*archive/zip.Writer).Close
        - os.Remove
        - os.RemoveAll
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
  exclusions:
    presets:
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

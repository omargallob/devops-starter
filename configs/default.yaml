# devops-starter default configuration
# Copy to ~/.config/devops-starter/config.yaml to customize

# Where binaries are installed (must be in $PATH)
install_dir: ~/.local/bin

# Enable or disable tool groups
groups:
  languages: true
  containers: true
  kubernetes: true
  infra: true
  cloud: true
  rust_tools: true
  utilities: true
  ai: false
  ansible: false
  package_managers: false

# Global package management — installs binaries distributed via pip/npm.
# Packages are declared in .mise.toml under [packages.pip] and [packages.npm].
# Example .mise.toml:
#   [packages.pip]
#   "black" = "24.4"
#   "ruff"  = "0.4"
#   [packages.npm]
#   "typescript" = "5.4"
#   "prettier"   = "3.2"
#
# packages:
#   python:
#     enabled: false
#     manager: pip   # pip or pipx
#     upgrade: false
#   node:
#     enabled: false
#     manager: npm

# Per-tool overrides
# Example:
#   overrides:
#     terraform:
#       version: "1.7.5"
#     aws-cli:
#       disabled: true
overrides: {}
